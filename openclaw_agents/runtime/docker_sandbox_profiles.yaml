schema_version: "1.0.0"

defaults:
  runtime: "docker"
  network: "off_by_default"
  workspace_mount: "scoped_rw"
  control_mounts: "read_only"
  secrets: "narrow_injection_only"
  execution: "ephemeral_per_run"
  reproducibility_required: true
  isolated_task_attempts: true

resource_limits:
  cpu_cores: 4
  memory_mb: 8192
  pids_limit: 512
  timeout_seconds: 3600

profiles:
  structured_reasoning:
    purpose: "Project orchestration, intake, clarification, and verification work."
    network: "off_by_default"
    writable_paths:
      - "/workspace"
      - "/tmp"
    required_commands:
      - "read project files"
      - "write structured artifacts"

  coding_task:
    purpose: "Implementation work that mutates project code."
    network: "off_by_default"
    writable_paths:
      - "/workspace"
      - "/tmp"
    required_commands:
      - "run build commands"
      - "modify source and test files"
      - "persist artifact refs before switch"
    switch_rule: "do_not_switch_mid_mutation"

  test_task:
    purpose: "Automated test execution and validation."
    network: "off_by_default"
    writable_paths:
      - "/workspace"
      - "/tmp"
    required_commands:
      - "run automated tests"
      - "write test execution report"
    switch_rule: "switch_only_after_test_results_persisted"

  recovery_task:
    purpose: "Workspace validation, recovery, and replay-safe repair."
    network: "off_by_default"
    writable_paths:
      - "/workspace"
      - "/tmp"
    required_commands:
      - "validate workspace consistency"
      - "rebuild worktree or checkpoint"
      - "reapply saved patch if needed"

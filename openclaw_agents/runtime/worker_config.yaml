schema_version: "1.0.0"

# Executors:
# - disabled: refuse to run the role
# - mock: emit synthetic artifacts only
# - builtin: deterministic control-plane loop executor
# - subprocess: raw command that reads OPENCLAW_TASK_PACKET and writes OPENCLAW_RESPONSE_FILE
# - prompt_subprocess: prompt-aware external backend with execution context
# - openclaw_workspace: workspace-backed OpenClaw agent executor intended for implementer/tester
#
# Example real-software backend:
# agents:
#   implementer:
#     executor: "openclaw_workspace"
#     thinking: "medium"
#   tester:
#     executor: "openclaw_workspace"
#     thinking: "minimal"

defaults:
  executor: "disabled"
  poll_interval_seconds: 1.0
  command_timeout_seconds: 3600
  response_dir_name: "runtime_responses"

agents:
  master:
    executor: "disabled"
  neo:
    executor: "disabled"
  agent_smith:
    executor: "builtin"
  niaobe:
    executor: "builtin"
  architect:
    executor: "builtin"
  morpheus:
    executor: "builtin"
  oracle:
    executor: "builtin"
  planner:
    executor: "builtin"
  implementer:
    executor: "openclaw_workspace"
    thinking: "minimal"
    command_timeout_seconds: 720
    openclaw_timeout_seconds: 660
    session_grace_seconds: 30
  tester:
    executor: "openclaw_workspace"
    thinking: "off"
    command_timeout_seconds: 720
    openclaw_timeout_seconds: 660
    session_grace_seconds: 30

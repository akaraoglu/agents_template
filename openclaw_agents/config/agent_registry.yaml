version: 3
human_roles:
  - master
default_visible_agents:
  - neo
  - agent_smith
  - niaobe
internal_only_default:
  - morpheus
  - planner
  - implementer
  - tester
defaults:
  zulip_visibility: visible
  workspace_access: read_only
  allowed_surfaces:
    - dm
    - project_topic
  policy_profile: advisory_default
agents:
  neo:
    role_type: executive
    runtime_mode: free_conversational
    purpose: executive technical operator
    dm_surface: first_class
    allowed_surfaces:
      - dm
      - project_topic
    allowed_skills:
      - project_context
      - workspace_ops
      - sdd_artifact_ops
      - web_research
      - zulip_projection
    allowed_services:
      - project_registry
      - conversation_memory
      - working_memory
      - web_research
      - command_runner
      - workspace_write
      - direct_project_mutation
      - projection_events
    policy_profile: neo_executive
    workspace_access: read_write
    zulip_visibility: visible
    escalation_targets:
      - agent_smith
    memory_profile:
      conversational_memory: read_write
      project_memory: read_write
      working_memory: read_write
      execution_memory: none
      conversation_ttl_hours: 72
      working_ttl_hours: 24
  agent_smith:
    role_type: general_manager
    runtime_mode: free_conversational
    purpose: free conversational project manager assistant
    dm_surface: first_class
    allowed_surfaces:
      - dm
      - project_topic
    allowed_skills:
      - project_context
      - workspace_ops
      - sdd_artifact_ops
      - zulip_projection
      - approval_and_mutation_guard
      - execution_handoff
    allowed_services:
      - project_registry
      - conversation_memory
      - working_memory
      - approvals
      - project_mutation
      - projection_events
    policy_profile: project_manager
    workspace_access: read_write
    zulip_visibility: visible
    escalation_targets:
      - neo
      - niaobe
    memory_profile:
      conversational_memory: read_write
      project_memory: read_write
      working_memory: read_write
      execution_memory: read_only
      conversation_ttl_hours: 72
      working_ttl_hours: 24
  niaobe:
    role_type: orchestrator
    runtime_mode: bounded_execution
    purpose: execution-only project orchestrator
    dm_surface: not_primary_human_surface
    allowed_surfaces:
      - project_topic
    allowed_skills:
      - project_context
      - execution_handoff
      - zulip_projection
    allowed_services:
      - project_registry
      - projection_events
      - execution_state
      - working_memory
    policy_profile: bounded_orchestrator
    workspace_access: read_only
    zulip_visibility: visible
    escalation_targets:
      - agent_smith
    memory_profile:
      conversational_memory: none
      project_memory: read_only
      working_memory: read_write
      execution_memory: read_write
      working_ttl_hours: 12
  morpheus:
    role_type: internal_orchestrator
    runtime_mode: internal_control
    purpose: owner of the internal software-development loop
    dm_surface: none
    allowed_surfaces:
      - control
    allowed_skills:
      - project_context
      - sdd_artifact_ops
      - execution_handoff
    allowed_services:
      - project_registry
      - projection_events
      - execution_state
      - working_memory
    policy_profile: internal_orchestrator
    workspace_access: read_only
    zulip_visibility: internal_only
    escalation_targets:
      - agent_smith
      - niaobe
    memory_profile:
      conversational_memory: none
      project_memory: read_only
      working_memory: read_write
      execution_memory: read_write
      working_ttl_hours: 24
  planner:
    role_type: internal_planner
    runtime_mode: internal_control
    purpose: internal planning specialist for approved execution work
    dm_surface: none
    allowed_surfaces:
      - control
    allowed_skills:
      - project_context
      - workspace_ops
      - execution_handoff
    allowed_services:
      - project_registry
      - working_memory
      - execution_state
    policy_profile: internal_planner
    workspace_access: read_only
    zulip_visibility: internal_only
    escalation_targets:
      - morpheus
      - agent_smith
    memory_profile:
      conversational_memory: none
      project_memory: read_only
      working_memory: read_write
      execution_memory: read_only
      working_ttl_hours: 24
  implementer:
    role_type: internal_implementer
    runtime_mode: internal_control
    purpose: internal implementation specialist for approved execution work
    dm_surface: none
    allowed_surfaces:
      - control
    allowed_skills:
      - project_context
      - workspace_ops
      - execution_handoff
    allowed_services:
      - project_registry
      - working_memory
      - execution_state
      - workspace_write
      - command_runner
    policy_profile: internal_implementer
    workspace_access: read_write
    zulip_visibility: internal_only
    escalation_targets:
      - morpheus
      - niaobe
    memory_profile:
      conversational_memory: none
      project_memory: read_only
      working_memory: read_write
      execution_memory: read_write
      working_ttl_hours: 24
  tester:
    role_type: internal_tester
    runtime_mode: internal_control
    purpose: internal verification specialist for approved execution work
    dm_surface: none
    allowed_surfaces:
      - control
    allowed_skills:
      - project_context
      - workspace_ops
      - execution_handoff
    allowed_services:
      - project_registry
      - working_memory
      - execution_state
      - command_runner
    policy_profile: internal_tester
    workspace_access: read_only
    zulip_visibility: internal_only
    escalation_targets:
      - morpheus
      - niaobe
      - agent_smith
    memory_profile:
      conversational_memory: none
      project_memory: read_only
      working_memory: read_write
      execution_memory: read_write
      working_ttl_hours: 24

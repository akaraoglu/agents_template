version: 3
default:
  provider: ollama
  model: gemma4:31b
  options:
    temperature: 1.0
    top_p: 0.95
    top_k: 64
agents:
  neo:
    provider: ollama
    model: gemma4:31b
  agent_smith:
    provider: ollama
    model: gemma4:31b
  niaobe:
    provider: ollama
    model: gemma4:31b
  morpheus:
    provider: ollama
    model: gemma4:31b
  planner:
    provider: ollama
    model: gemma4:31b
  implementer:
    provider: ollama
    model: gemma4:31b
  tester:
    provider: ollama
    model: gemma4:31b
notes:
  - Gemma 4 31B is the shared local runtime model for visible and internal agents.
  - Thinking is enabled in the runtime by prefixing the system prompt with <|think|> for Gemma 4.
  - Ollama best-practice sampling comes from the official gemma4:31b model page.

schema_version: "1.0.0"
machine_id: "niaobe_project_loop"
owner: "niaobe"
purpose: "Adaptive project orchestration from project charter to verified closure."

lease_policy:
  lease_required: true
  orchestrator_id: "niaobe"
  max_active_projects: 1
  lease_ttl_minutes: 30
  renew_interval_minutes: 5

safe_boundaries:
  - "after charter validation decision is persisted"
  - "after architect result is persisted"
  - "after morpheus delivery package is persisted"
  - "after oracle verification report is persisted"
  - "after escalation packet is persisted"
  - "after project status snapshot is persisted"

control_commands:
  PAUSE_PROJECT:
    allowed_from: ["RECEIVED", "CLARIFY", "DECIDE_NEXT", "WAITING_RESULT", "REVIEW_RESULT", "ESCALATE"]
    actions:
      - "mark pause_requested = true"
      - "persist final boundary snapshot"
      - "release niaobe lease"
    next_state: "PAUSED"
  RESUME_PROJECT:
    allowed_from: ["PAUSED"]
    actions:
      - "acquire niaobe lease"
      - "load last_snapshot_id"
      - "continue from next_action"
    next_state: "RESTORE_FROM_SNAPSHOT"
  SWITCH_PROJECT:
    allowed_from: ["WAITING_RESULT", "ESCALATE", "PAUSED"]
    actions:
      - "validate safe boundary or require FORCE_INTERRUPT"
      - "persist project snapshot"
      - "release niaobe lease"
      - "emit switch audit event"
  FORCE_INTERRUPT:
    allowed_from: ["RECEIVED", "CLARIFY", "DECIDE_NEXT", "WAITING_RESULT", "REVIEW_RESULT", "ESCALATE"]
    actions:
      - "mark project_status = PAUSE_REQUESTED or BLOCKED"
      - "persist interrupted run metadata"
      - "require recovery assessment before resume"

states:
  RECEIVED:
    runtime_status: "ACTIVE"
    transitions:
      CHARTER_INCOMPLETE: "CLARIFY"
      CHARTER_VALID: "DECIDE_NEXT"

  CLARIFY:
    runtime_status: "ACTIVE"
    rule: "Niaobe requests clarification from Neo or AgentSmith. She does not silently invent missing requirements."
    transitions:
      CLARIFIED: "DECIDE_NEXT"
      BLOCKED: "ESCALATE"

  DECIDE_NEXT:
    runtime_status: "ACTIVE"
    decision_rules:
      - when: "design_complete == false"
        action: "assign DESIGN_ARCHITECTURE to architect"
        next_state: "WAITING_RESULT"
      - when: "design_complete == true and implementation_complete == false"
        action: "assign ORCHESTRATE_SOFTWARE to morpheus"
        next_state: "WAITING_RESULT"
      - when: "design_complete == true and implementation_complete == true and verification_complete == false"
        action: "assign VERIFY_PROJECT to oracle"
        next_state: "WAITING_RESULT"
      - when: "design_complete == true and implementation_complete == true and verification_complete == true"
        action: "produce project_closure_report"
        next_state: "DONE"

  WAITING_RESULT:
    runtime_status_map:
      default: "ACTIVE"
      oracle_in_progress: "WAITING_VERIFICATION"
      human_or_external_input_required: "WAITING_EXTERNAL"
    scheduler_behavior:
      switch_allowed_after_persisted_boundary: true
      recommended_switch_triggers:
        - "Oracle verification in progress"
        - "Escalation pending human decision"
        - "Morpheus task in progress and Niaobe has no immediate local action"
        - "Project explicitly paused"
        - "Higher-priority eligible project arrives"
    transitions:
      RESULT_SUCCESS: "REVIEW_RESULT"
      RESULT_NEEDS_CLARIFICATION: "CLARIFY"
      RESULT_BLOCKED: "ESCALATE"
      RESULT_FAILED: "REVIEW_RESULT"

  REVIEW_RESULT:
    runtime_status: "ACTIVE"
    decision_rules:
      - when: "artifact_type == architecture_spec"
        action: "set design_complete = true"
        next_state: "DECIDE_NEXT"
      - when: "artifact_type == software_delivery_package"
        action: "set implementation_complete = true"
        next_state: "DECIDE_NEXT"
      - when: "artifact_type == verification_report and result == PASS"
        action: "set verification_complete = true"
        next_state: "DECIDE_NEXT"
      - when: "artifact_type == verification_report and result == FAIL and defect_category == implementation"
        action: "set implementation_complete = false; assign morpheus"
        next_state: "WAITING_RESULT"
      - when: "artifact_type == verification_report and result == FAIL and defect_category == design"
        action: "set design_complete = false; set implementation_complete = false; assign architect"
        next_state: "WAITING_RESULT"
      - when: "artifact_type == verification_report and result == FAIL and defect_category == requirements"
        action: "escalate to agent_smith or neo"
        next_state: "ESCALATE"
      - when: "otherwise"
        action: "decide next best step based on latest evidence"
        next_state: "DECIDE_NEXT"

  ESCALATE:
    runtime_status_map:
      awaiting_human_or_executive_decision: "WAITING_EXTERNAL"
      unresolved_blocker: "BLOCKED"
    rule: "Niaobe must send an explicit escalation packet with a recommended action."
    scheduler_behavior:
      switch_allowed_after_persisted_boundary: true
    transitions:
      ESCALATION_RESOLVED: "DECIDE_NEXT"
      ESCALATION_REJECTED: "BLOCKED"

  PAUSED:
    runtime_status: "PAUSED"
    terminal: false

  RESTORE_FROM_SNAPSHOT:
    runtime_status: "ACTIVE"
    rule: "Scheduler rehydrates the last persisted snapshot and resumes from the saved next_action."
    transitions:
      SNAPSHOT_LOADED: "DECIDE_NEXT"
      SNAPSHOT_INVALID: "BLOCKED"

  DONE:
    runtime_status: "DONE"
    terminal: true

  BLOCKED:
    runtime_status: "BLOCKED"
    terminal: true

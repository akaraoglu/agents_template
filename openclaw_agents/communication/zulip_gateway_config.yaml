version: 2
zulip_server_url: https://zulip.localnet:3838
verify_tls: false
enabled_agents:
  - neo
  - agent_smith
  - niaobe
bot_identities:
  neo: neo-bot@bots.localdomain
  agent_smith: agentsmith-bot@bots.localdomain
  niaobe: niaobe-bot@localhost.localdomain
bot_credentials_secret_refs:
  neo: env:ZULIP_KEY_NEO
  agent_smith: env:ZULIP_KEY_AGENT_SMITH
  niaobe: env:ZULIP_KEY_NIAOBE
local_dev_credentials_file: zulip_bots_email_and_keys.txt
required_streams:
  - projects
required_subscriptions:
  neo: [projects]
  agent_smith: [projects]
  niaobe: [projects]
topic_conventions:
  project_main: project/{project_id}
runtime:
  poll_interval_seconds: 1.0
  queue_timeout_seconds: 10
  batch_size: 50
  startup_subscriptions: true
checkpoint_store: system/state/event_dedupe.json
message_mapping_store: system/state/message_mappings.json
